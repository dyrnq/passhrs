name: CI

"on":
  push:
    branches: [main]
    tags-ignore: ["v*"]
    paths-ignore: ["README.md"]
  pull_request:
    branches: [main]
    paths-ignore: ["README.md"]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: passhrs

jobs:
  lint:
    name: Lint & fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  unit-tests:
    name: Unit tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: macos-14
            os: macos-14
            target: aarch64-apple-darwin
          - name: windows-msvc
            os: windows-2022
            target: x86_64-pc-windows-msvc
          - name: windows-gnu
            os: windows-2022
            target: x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install NASM (windows only)
        if: matrix.name == 'windows-msvc'
        uses: ilammy/setup-nasm@v1

      - name: Install NASM (windows gnu)
        if: matrix.name == 'windows-gnu'
        uses: ilammy/setup-nasm@v1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.name }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary for tests
        shell: bash
        run: |
          mkdir -p target/release 2>/dev/null || true
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ (contains(matrix.target, 'windows') && '.exe' || '') }} target/release/${{ env.BINARY_NAME }}${{ (contains(matrix.target, 'windows') && '.exe' || '') }}

      - name: Run tests
        run: cargo test --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ (contains(matrix.target, 'windows') && '.exe' || '') }}
          if-no-files-found: warn

  integration-tests:
    name: Integration tests (${{ matrix.os }})
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: integration-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Provision native sshd (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: sudo ./tests/sshd/setup-linux.sh

      - name: Provision sshd via Homebrew openssh + key auth (macOS)
        # Replaces the previous native-sshd provision on macos-14.
        # macOS Sonoma+ secure-token lockout makes the native
        # testuser password path fundamentally unreliable (dscl
        # . -passwd, sysadminctl -resetPasswordFor, and passwd all
        # fail unless you supply the user's old password). Instead
        # of fighting it, this step installs Homebrew's openssh,
        # drops an ed25519 public key into testuser's
        # authorized_keys (key auth bypasses the password path
        # entirely), and configures sshd with PasswordAuthentication
        # no so any future regression that re-enables password tries
        # fails fast with a clear "Permission denied (publickey)".
        # Linux and Windows continue to use their native sshd
        # provisions — this is macOS-only.
        if: matrix.os == 'macos-14'
        run: sudo ./tests/sshd/setup-macos-brew-openssh.sh

      - name: Provision native sshd (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: ./tests/sshd/setup-windows.ps1

      - name: Build release
        run: cargo build --release

      - name: Run integration tests
        # NB: do NOT inject `--` before --test-threads=1; libtest treats
        # the second `--` as a positional-arg separator and then parses
        # `--test-threads=1` as a TEST-NAME FILTER, which matches
        # nothing and silently causes all integration tests to be
        # reported as "filtered out" (i.e. never executed).
        #
        # RUST_LOG=passhrs=debug forces the env_logger in src/main.rs
        # to emit DEBUG-level traces (env-var forwarding, SFTP init,
        # sshd handshake timing, …) to stderr for every passhrs child
        # process the test harness spawns. We pipe stderr+stdout
        # through `tee` so the live GitHub log still shows the test
        # summary AND we get a persisted file for after-the-fact
        # diagnosis (uploaded as an artifact below, always — not
        # gated on `failure()` — so a green run's logs are still
        # available if a flake shows up on a later run).
        env:
          RUST_LOG: passhrs=debug
        run: |
          cargo test --release -- --include-ignored --test-threads=1 \
              2>&1 | tee integration-test.log
          # Keep cargo's exit code so the step still fails when tests
          # do; `tee` doesn't propagate it. `exit ${PIPESTATUS[0]}` is
          # the canonical idiom — using just `${PIPESTATUS[0]}` on its
          # own line makes bash try to execute the number as a command
          # when PIPESTATUS[0] is 0, and the step fails with
          # "0: command not found" even though all tests passed.
          exit "${PIPESTATUS[0]}"

      - name: Upload integration test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-log-${{ matrix.os }}
          path: integration-test.log
          if-no-files-found: warn

      - name: Dump sshd log on failure (unix)
        if: failure() && matrix.os != 'windows-2022'
        shell: bash
        run: |
          # The integration suite can fail because passhrs cannot
          # authenticate against the test sshd. sshd's reason is in
          # its log file, not in passhrs's stderr ("Authentication
          # failed"). Print it so the failure is debuggable from the
          # GitHub UI without downloading artifacts.
          #
          # The setup script runs under sudo, so the log files are
          # owned by root. Use `sudo -n cat` so the dump works without
          # an interactive password prompt (sudo on GitHub-hosted
          # runners is passwordless for the runner user).
          set +e
          for log in \
              "${TMPDIR:-/tmp}/passhrs-test-sshd/sshd.log" \
              "/tmp/passhrs-test-sshd/sshd.log" \
              "/var/log/auth.log"; do
              if [ -e "$log" ]; then
                  echo "=== sshd log: $log ==="
                  # Dump the FULL log on macOS so we see the debug
                  # lines around the auth attempt (PAM module list,
                  # each module's verdict) — tailing loses the
                  # earlier context that's the difference between
                  # "fix dscl" and "fix sshd_config".
                  if [ "$log" = "${TMPDIR:-/tmp}/passhrs-test-sshd/sshd.log" ] \
                      || [ "$log" = "/tmp/passhrs-test-sshd/sshd.log" ]; then
                      sudo -n cat "$log" 2>/dev/null \
                          || cat "$log" 2>/dev/null \
                          || true
                  else
                      sudo -n tail -n 200 "$log" 2>/dev/null \
                          || tail -n 200 "$log" 2>/dev/null \
                          || true
                  fi
              fi
          done
          # Also dump the rendered sshd_config so we can see what
          # sshd was actually using.
          for cfg in \
              "${TMPDIR:-/tmp}/passhrs-test-sshd/sshd_config" \
              "/tmp/passhrs-test-sshd/sshd_config"; do
              if [ -e "$cfg" ]; then
                  echo "=== sshd config: $cfg ==="
                  sudo -n cat "$cfg" 2>/dev/null \
                      || cat "$cfg" 2>/dev/null \
                      || true
              fi
          done

      - name: Dump sshd log on failure (Windows)
        if: failure() && matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          # Mirror of the unix step above. Windows sshd logs under
          # %ProgramData%\ssh\logs by default (or wherever the
          # setup-windows.ps1 put it).
          $logs = @(
              "$env:ProgramData\ssh\logs\sshd.log",
              "$env:ProgramData\ssh\sshd.log",
              "$env:ProgramData\ssh\logs\sshd",
              "$env:ProgramData\ssh\OpenSSH_ConfigDiag.log"
          )
          foreach ($log in $logs) {
              if (Test-Path -LiteralPath $log) {
                  Write-Host "=== sshd log: $log ==="
                  Get-Content -LiteralPath $log -Tail 200 -ErrorAction SilentlyContinue
              }
          }
          $cfgs = @(
              "$env:ProgramData\ssh\sshd_config",
              "C:\ProgramData\ssh\sshd_config"
          )
          foreach ($cfg in $cfgs) {
              if (Test-Path -LiteralPath $cfg) {
                  Write-Host "=== sshd config: $cfg ==="
                  Get-Content -LiteralPath $cfg -ErrorAction SilentlyContinue
              }
          }

  cross-linux:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          if-no-files-found: warn

  docker:
    name: Docker multi-arch build & push (main)
    needs: [unit-tests, cross-linux]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build x86_64 musl binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Stage x86_64 binary
        run: |
          mkdir -p bin/amd64
          cp target/x86_64-unknown-linux-musl/release/${{ env.BINARY_NAME }} bin/amd64/${{ env.BINARY_NAME }}

      - name: Download aarch64-gnu artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-unknown-linux-gnu
          path: artifacts-gnu

      - name: Download aarch64-musl artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-unknown-linux-musl
          path: artifacts-musl

      - name: Stage aarch64 binary (prefer musl)
        run: |
          mkdir -p bin/arm64
          if [ -f artifacts-musl/${{ env.BINARY_NAME }} ]; then
            cp artifacts-musl/${{ env.BINARY_NAME }} bin/arm64/${{ env.BINARY_NAME }}
          else
            cp artifacts-gnu/${{ env.BINARY_NAME }} bin/arm64/${{ env.BINARY_NAME }}
          fi
          chmod +x bin/arm64/${{ env.BINARY_NAME }}
          ls -la bin/amd64/ bin/arm64/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.BINARY_NAME }}
          tags: |
            type=raw,value=main

      - name: Build multi-arch (no push, no login)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.static
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push (login required)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.static
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
